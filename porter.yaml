version: v2
name: fullstack
services:
- name: web
  run: ""
  type: web
  instances: 1
  cpuCores: 0.1
  ramMegabytes: 400
  terminationGracePeriodSeconds: 30
  port: 8000
  private: true
  sleep: false
build:
  context: ./
  method: docker
  dockerfile: Dockerfile
predeploy:
  run: sleep 20
  cpuCores: 0.16
  ramMegabytes: 512
  terminationGracePeriodSeconds: 0
  timeoutSeconds: 3600
